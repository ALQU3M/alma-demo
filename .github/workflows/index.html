<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alma — Assistante virtuelle étudiante</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #7c6dfa;
    --accent-soft: rgba(124, 109, 250, 0.12);
    --text-primary: #f0effe;
    --text-secondary: #8884a8;
    --font: 'Inter', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    gap: 0;
  }

  .glow {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(124, 109, 250, 0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem 2.5rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-soft);
    border: 1px solid rgba(124, 109, 250, 0.3);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.04em;
    margin-bottom: 1.5rem;
  }

  .dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-size: 3rem;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
    line-height: 1;
  }

  .school {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
  }

  p {
    font-size: 1rem;
    color: var(--text-secondary);
    line-height: 1.65;
    margin-bottom: 2.5rem;
    font-weight: 300;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 0.95rem;
    font-weight: 500;
    font-family: var(--font);
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    text-decoration: none;
  }

  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn svg { width: 18px; height: 18px; }

  .footer {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: var(--text-secondary);
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="glow"></div>

<div class="card">
  <div class="badge">
    <div class="dot"></div>
    Disponible 24h/24
  </div>

  <h1>Alma</h1>
  <div class="school">EM Normandie — Campus Paris</div>

  <p>Votre assistante virtuelle étudiante.<br>
  Calendrier, démarches administratives,<br>orientation vers les bons services.</p>

  <button class="btn" onclick="openWidget()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    Parler à Alma
  </button>

  <div class="footer">Propulsé par EM Normandie</div>
</div>

<script id="retell-widget"
  src="https://dashboard.retellai.com/retell-widget.js"
  type="module"
  data-public-key="public_key_8a48de5b19bafcae69af4"
  data-agent-id="ag_432bf9045b4a95c362608881d6"
  data-show-widget-button="false">
</script>

<script>
  function openWidget() {
    const widget = document.getElementById('retell-widget');
    if (widget && widget.openWidget) {
      widget.openWidget();
    } else {
      const event = new CustomEvent('retell-widget-open');
      document.dispatchEvent(event);
    }
  }
</script>

</body>
</html>
