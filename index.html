<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alma — Assistante virtuelle étudiante</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #7c6dfa;
    --accent-soft: rgba(124, 109, 250, 0.12);
    --text-primary: #f0effe;
    --text-secondary: #8884a8;
    --font: 'Inter', sans-serif;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .glow {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(124, 109, 250, 0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .card {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem 2.5rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-soft);
    border: 1px solid rgba(124, 109, 250, 0.3);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.04em;
    margin-bottom: 1.5rem;
  }
  .dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  h1 {
    font-size: 3rem;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
    line-height: 1;
  }
  .school {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
  }
  p {
    font-size: 1rem;
    color: var(--text-secondary);
    line-height: 1.65;
    margin-bottom: 2rem;
    font-weight: 300;
  }
  .cta-hint {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 0.5rem;
  }
  .arrow-hint {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: var(--text-secondary);
    opacity: 0.7;
    animation: bounce 1.5s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(4px); }
  }
  .arrow-hint svg {
    width: 14px;
    height: 14px;
  }
  .footer {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: var(--text-secondary);
    opacity: 0.4;
  }

  /* Force le bouton Retell au centre */
  :host, retell-widget {
    display: flex;
    justify-content: center;
  }
</style>
</head>
<body>

<div class="glow"></div>

<div class="card">
  <div class="badge">
    <div class="dot"></div>
    Disponible 24h/24
  </div>

  <h1>Alma</h1>
  <div class="school">EM Normandie — Campus Paris</div>

  <p>Votre assistante virtuelle étudiante.<br>
  Calendrier, démarches administratives,<br>orientation vers les bons services.</p>

  <div class="cta-hint">
    <div class="arrow-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
      Cliquez sur le bouton ci-dessous pour parler à Alma
    </div>
  </div>

  <div class="footer">Alma — AI Receptionist</div>
</div>

<script id="retell-widget"
  src="https://dashboard.retellai.com/retell-widget.js"
  type="module"
  data-public-key="public_key_8a48de5b19bafcae69af4"
  data-agent-id="agent_432bf9045b4a95c362608881d6"
  data-show-widget-button="true">
</script>

<script>
  window.addEventListener('load', () => {
    setTimeout(() => {
      const allEls = document.querySelectorAll('*');
      for (const el of allEls) {
        if (el.shadowRoot) {
          const btn = el.shadowRoot.querySelector('button');
          if (btn) {
            btn.style.position = 'fixed';
            btn.style.bottom = '50%';
            btn.style.right = '50%';
            btn.style.transform = 'translate(50%, 50%)';
            btn.style.zIndex = '9999';
          }
        }
      }
    }, 1000);
  });
</script>

</body>
</html>
